server:
  port: 8083

spring:
  application:
    name: extraction-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: extraction-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.rajesh.*"

llm:
  default-provider: ${LLM_DEFAULT_PROVIDER:openai}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o}
    base-url: https://api.openai.com/v1
  bedrock:
    region: ${AWS_REGION:us-east-1}
    model-id: ${BEDROCK_MODEL_ID:anthropic.claude-3-sonnet-20240229-v1:0}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-pro}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.rajesh: DEBUG
